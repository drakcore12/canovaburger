<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title description">
  <title id="title">Isotipo Canova Burgers</title>
  <desc id="description">Letra C transformada en hamburguesa, con fondo transparente.</desc>
  <defs>
    <clipPath id="top"><rect width="200" height="86"/></clipPath>
    <clipPath id="bottom"><rect y="114" width="200" height="86"/></clipPath>
    <filter id="grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="16" result="noise"/>
      <feComposite in="noise" in2="SourceGraphic" operator="in" result="texture"/>
      <feBlend in="SourceGraphic" in2="texture" mode="multiply"/>
    </filter>
  </defs>
  <g filter="url(#grain)">
    <path d="M161.46 148.02A78 78 0 1 1 161.46 51.98L133.88 73.53A43 43 0 1 0 133.88 126.47Z" fill="#F2E9D8" clip-path="url(#top)"/>
    <path d="M161.46 148.02A78 78 0 1 1 161.46 51.98L133.88 73.53A43 43 0 1 0 133.88 126.47Z" fill="#F2E9D8" clip-path="url(#bottom)"/>
    <path d="M31 91c23-5 49 5 73 0 17-3 33-3 46 0 3 1 4 6 1 8-22 5-47 0-69 3-22 2-39-3-51-1-5 1-6-7 0-10Z" fill="#FFC72C"/>
    <rect x="29" y="103" width="121" height="9" rx="4.5" fill="#E6392E"/>
  </g>
  <g fill="#0D0D0D">
    <ellipse cx="70" cy="40" rx="3.3" ry="1.5" transform="rotate(-20 70 40)"/>
    <ellipse cx="92" cy="30" rx="3.3" ry="1.5" transform="rotate(15 92 30)"/>
    <ellipse cx="116" cy="36" rx="3.3" ry="1.5" transform="rotate(-10 116 36)"/>
    <ellipse cx="54" cy="55" rx="3.3" ry="1.5" transform="rotate(25 54 55)"/>
    <ellipse cx="99" cy="52" rx="3.3" ry="1.5" transform="rotate(-25 99 52)"/>
    <ellipse cx="133" cy="53" rx="3.3" ry="1.5" transform="rotate(20 133 53)"/>
  </g>
</svg>